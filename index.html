<style>
/*  ============================================================
    CIPHER LAB · Bletchley Park chalkboard / WW2 cryptanalysis
    -----------------------------------------------------------
    Theme: a chalkboard in a wartime cipher room. Slate-green
    surface, hand-chalked headings, typewriter-monospace body,
    yellow-chalk accents, eraser smudges. Hand-written display
    against typed/encoded body.
    ============================================================ */
  :root {
    --slate:#1a3520;
    --slate-deep:#0e2014;
    --slate-light:#264a30;
    --chalk:#f5f1e0;
    --chalk-dim:#c8c2a8;
    --chalk-faint:#8a8470;
    --chalk-yellow:#f0d44a;
    --chalk-coral:#e8554a;
    --chalk-blue:#7ca8c8;
    --eraser:rgba(245, 241, 224, 0.06);
    --smudge:rgba(245, 241, 224, 0.10);
    --rule:rgba(245, 241, 224, 0.18);
    --rule-strong:rgba(245, 241, 224, 0.36);
    --bg: var(--slate);
    --panel: var(--slate-light);
    --panel-2: var(--slate-deep);
    --ink: var(--chalk);
    --ink-soft: var(--chalk-dim);
    --ink-faint: var(--chalk-faint);
    --accent: var(--chalk-yellow);
    --accent-deep: #c8b030;
    --warn: var(--chalk-coral);
    --border: var(--rule);

    --hand:'Caveat', cursive;
    --mono:'Fira Code', ui-monospace, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--mono);
    background: var(--slate);
    color: var(--chalk);
    line-height: 1.55;
    min-height: 100vh;
    padding: 1rem;
    /* Chalkboard texture — soft noise + vignette */
    background-image:
      radial-gradient(ellipse 90% 70% at 50% 50%, transparent 0%, rgba(0, 0, 0, 0.35) 100%);
    -webkit-font-smoothing: antialiased;
    position: relative;
  }
  body::before {
    content:"";position:fixed;inset:0;pointer-events:none;z-index:1;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.4' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.55'/></svg>");
    opacity:0.10;mix-blend-mode:screen;
  }
  /* Faint chalk-smudge horizontal streaks */
  body::after {
    content:"";position:fixed;inset:0;pointer-events:none;z-index:1;
    background-image:
      linear-gradient(180deg, transparent 0%, transparent 18%, rgba(245, 241, 224, 0.04) 19%, transparent 20%),
      linear-gradient(180deg, transparent 0%, transparent 52%, rgba(245, 241, 224, 0.03) 53%, transparent 54%),
      linear-gradient(180deg, transparent 0%, transparent 81%, rgba(245, 241, 224, 0.04) 82%, transparent 83%);
  }
  .container { max-width: 880px; margin: 0 auto; position: relative; z-index: 2; }
  header {
    text-align: left;
    padding: 32px 0 28px;
    border-bottom: 2px dashed var(--rule);
    margin-bottom: 28px;
  }
  header h1 {
    font-family: var(--hand); font-weight: 600;
    font-size: clamp(72px, 12vw, 144px);
    color: var(--chalk);
    margin: 0;
    letter-spacing: -0.005em;
    line-height: 0.85;
    text-shadow: 0 0 1px var(--chalk);
  }
  header h1::after {
    content: ".";
    color: var(--chalk-yellow);
  }
  header p {
    font-family: var(--mono); font-weight: 400;
    color: var(--chalk-dim);
    font-size: 13px;
    margin-top: 12px;
    letter-spacing: 0.06em;
  }
  .header-stamp {
    display: inline-block;
    font-family: var(--mono); font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.32em;
    color: var(--chalk-coral);
    border: 2px solid var(--chalk-coral);
    padding: 4px 10px;
    margin-top: 16px;
    transform: rotate(-2deg);
    background: rgba(232, 85, 74, 0.05);
  }

  .nav {
    display: flex; gap: 0;
    margin-bottom: 24px;
    flex-wrap: wrap;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }
  .nav button {
    flex: 1; min-width: 90px;
    padding: 12px 10px;
    background: transparent;
    color: var(--chalk-dim);
    border: none;
    border-right: 1px solid var(--rule);
    border-radius: 0;
    font-family: var(--mono); font-weight: 500;
    font-size: 11px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    transition: all .12s;
    position: relative;
  }
  .nav button:last-child { border-right: none; }
  .nav button.active { color: var(--chalk-yellow); }
  .nav button.active::after {
    content:""; position:absolute; left:8px; right:8px; bottom:-1px;
    height: 2px;
    background: var(--chalk-yellow);
    box-shadow: 0 0 8px var(--chalk-yellow);
  }
  .nav button:hover:not(.active) { color: var(--chalk); background: var(--smudge); }

  .panel {
    background: transparent;
    border: 1.5px dashed var(--rule);
    border-radius: 0;
    padding: 24px 26px;
    margin-bottom: 22px;
    position: relative;
  }
  .panel::before {
    /* Chalk-tray nail at corner */
    content:""; position:absolute; top:-4px; left:14px;
    width: 6px; height: 6px;
    background: var(--chalk-yellow);
    border-radius: 50%;
    box-shadow: 0 0 4px var(--chalk-yellow);
  }
  .panel h2 {
    font-family: var(--hand); font-weight: 600;
    font-size: 28px;
    color: var(--chalk-yellow);
    text-transform: none;
    letter-spacing: 0;
    margin-bottom: 12px;
    line-height: 1;
  }
  .panel .desc {
    font-family: var(--mono); font-weight: 400;
    color: var(--chalk-dim);
    font-size: 13.5px;
    margin-bottom: 18px;
    line-height: 1.6;
    letter-spacing: 0.01em;
  }

  textarea, input[type="text"], input[type="number"] {
    width: 100%;
    background: var(--slate-deep);
    color: var(--chalk);
    border: 1px solid var(--rule);
    border-radius: 0;
    padding: 12px 14px;
    font-family: var(--mono); font-size: 14.5px;
    margin-bottom: 12px;
    resize: vertical;
  }
  textarea { min-height: 88px; }
  input:focus, textarea:focus {
    outline: none;
    border-color: var(--chalk-yellow);
    box-shadow: 0 0 0 2px rgba(240, 212, 74, 0.18);
  }
  input::placeholder, textarea::placeholder { color: var(--chalk-faint); }

  .controls {
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 0.75rem;
  }
  .controls label {
    color: var(--ink-soft);
    font-size: 0.85rem;
  }
  .controls input[type="number"], .controls input[type="text"] {
    width: auto;
    flex: 1;
    min-width: 100px;
    margin-bottom: 0;
  }

  button {
    background: var(--chalk-yellow);
    color: var(--slate-deep);
    border: none;
    padding: 10px 18px;
    border-radius: 0;
    font-family: var(--mono); font-weight: 700;
    font-size: 11px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    transition: all .12s;
  }
  button:hover { background: var(--chalk); }
  button.ghost {
    background: transparent;
    color: var(--chalk-dim);
    border: 1px solid var(--rule-strong);
  }
  button.ghost:hover { color: var(--chalk-yellow); border-color: var(--chalk-yellow); background: rgba(240, 212, 74, 0.06); }

  .output {
    background: var(--slate-deep);
    border: 1px solid var(--rule);
    border-left: 3px solid var(--chalk-yellow);
    padding: 14px 16px;
    border-radius: 0;
    color: var(--chalk);
    font-family: var(--mono); font-size: 14.5px;
    white-space: pre-wrap;
    word-break: break-all;
    margin-top: 12px;
    line-height: 1.6;
    letter-spacing: 0.04em;
  }

  .row-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }

  .table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 14px;
    font-family: var(--mono); font-size: 13px;
  }
  .table th, .table td {
    border: 1px solid var(--rule);
    padding: 6px 10px;
    text-align: center;
  }
  .table th {
    background: var(--slate-deep);
    color: var(--chalk-yellow);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 11px;
  }
  .table td { color: var(--chalk-dim); }

  .hint {
    font-family: var(--hand);
    color: var(--chalk-blue);
    font-size: 18px;
    font-style: normal;
    margin-top: 8px;
    line-height: 1.3;
  }

  footer {
    text-align: left;
    margin-top: 36px;
    padding-top: 22px;
    border-top: 1px dashed var(--rule);
    color: var(--chalk-faint);
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.04em;
  }
  footer a { color: var(--chalk-yellow); text-decoration: none; border-bottom: 1px dotted var(--chalk-yellow); }
  .credit {
    font-family: var(--mono); font-weight: 600;
    font-size: 9px;
    letter-spacing: 0.42em;
    color: var(--chalk-faint);
    text-transform: uppercase;
    margin-top: 14px;
    opacity: 0.6;
  }

  .puzzle-display {
    background: var(--slate-deep);
    border: 2px solid var(--chalk-yellow);
    padding: 22px 18px;
    border-radius: 0;
    margin-top: 14px;
    font-family: var(--hand); font-weight: 600;
    font-size: 28px;
    text-align: center;
    line-height: 1.4;
    color: var(--chalk-yellow);
    letter-spacing: 0.02em;
    text-shadow: 0 0 1px var(--chalk-yellow);
    position: relative;
  }
  .puzzle-display::before {
    content:"DECRYPT";
    position: absolute; top:-9px; left:50%; transform: translateX(-50%);
    background: var(--slate);
    font-family: var(--mono); font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.32em;
    color: var(--chalk-yellow);
    padding: 0 10px;
  }
</style>

<body>
<div class="container">

<header>
  <h1>cipher lab</h1>
  <p>encode · decode · hide · reveal</p>
  <span class="header-stamp">CLASSIFIED · OFFICE OF CRYPTANALYSIS</span>
</header>

<div class="nav" id="nav"></div>

<div id="content"></div>

<footer>
  <p>Built for Lee Summer Honors cryptography week. Six ciphers covered.<br>
  <a href="https://github.com/thebigjah/cipher-lab">github.com/thebigjah/cipher-lab</a> · <a href="#" onclick="document.body.scrollIntoView({top:0})">↑ top</a>
  </p>
  <div class="credit">— PURCELLVENTURES.CO —</div>
</footer>

</div>

<script>
'use strict';

const CIPHERS = [
  { id: 'caesar', label: 'Caesar', renderer: renderCaesar },
  { id: 'atbash', label: 'Atbash', renderer: renderAtbash },
  { id: 'vigenere', label: 'Vigenère', renderer: renderVigenere },
  { id: 'rot13', label: 'ROT13', renderer: renderRot13 },
  { id: 'bacon', label: 'Bacon', renderer: renderBacon },
  { id: 'rail', label: 'Rail Fence', renderer: renderRailFence },
  { id: 'enigma', label: 'Enigma', renderer: renderEnigma },
  { id: 'hunt', label: 'Puzzle Hunt', renderer: renderHunt },
  { id: 'crack', label: 'Crack This', renderer: renderCrack },
];

const nav = document.getElementById('nav');
const content = document.getElementById('content');

CIPHERS.forEach(c => {
  const btn = document.createElement('button');
  btn.textContent = c.label;
  btn.dataset.id = c.id;
  btn.addEventListener('click', () => showCipher(c.id));
  nav.appendChild(btn);
});

function showCipher(id) {
  document.querySelectorAll('.nav button').forEach(b => {
    b.classList.toggle('active', b.dataset.id === id);
  });
  const c = CIPHERS.find(x => x.id === id);
  content.innerHTML = '';
  c.renderer(content);
  history.replaceState(null, '', '#' + id);
}

// ============ CAESAR ============
function caesarShift(text, n) {
  return text.replace(/[a-zA-Z]/g, ch => {
    const base = ch >= 'a' ? 97 : 65;
    return String.fromCharCode(((ch.charCodeAt(0) - base + n) % 26 + 26) % 26 + base);
  });
}

function renderCaesar(root) {
  root.innerHTML = `
    <div class="panel">
      <h2>Caesar Cipher</h2>
      <p class="desc">Each letter shifts forward by a fixed number. Named for Julius Caesar (shift of 3). Trivially breakable by frequency analysis — try shifting 1 through 25 until something reads as English.</p>
      <textarea id="caesar-in" placeholder="Type plaintext or ciphertext here..."></textarea>
      <div class="controls">
        <label>Shift</label>
        <input type="number" id="caesar-shift" value="3" min="-25" max="25">
        <button onclick="document.getElementById('caesar-shift').value = Math.floor(Math.random() * 25) + 1; runCaesar();">Random</button>
        <button onclick="runCaesar()">Encode →</button>
        <button class="ghost" onclick="runCaesarReverse()">← Decode</button>
        <button class="ghost" onclick="bruteCaesar()">Brute force</button>
      </div>
      <div id="caesar-out" class="output">—</div>
      <p class="hint">Tip: the shift-by-13 special case is called ROT13 and is its own tab.</p>
    </div>
  `;
}
window.runCaesar = () => {
  const t = document.getElementById('caesar-in').value;
  const n = parseInt(document.getElementById('caesar-shift').value, 10) || 0;
  document.getElementById('caesar-out').textContent = caesarShift(t, n);
};
window.runCaesarReverse = () => {
  const t = document.getElementById('caesar-in').value;
  const n = parseInt(document.getElementById('caesar-shift').value, 10) || 0;
  document.getElementById('caesar-out').textContent = caesarShift(t, -n);
};
window.bruteCaesar = () => {
  const t = document.getElementById('caesar-in').value;
  const lines = [];
  for (let i = 1; i <= 25; i++) {
    lines.push(String(i).padStart(2, ' ') + ': ' + caesarShift(t, -i));
  }
  document.getElementById('caesar-out').textContent = lines.join('\n');
};

// ============ ATBASH ============
function atbash(text) {
  return text.replace(/[a-zA-Z]/g, ch => {
    const base = ch >= 'a' ? 97 : 65;
    return String.fromCharCode(25 - (ch.charCodeAt(0) - base) + base);
  });
}

function renderAtbash(root) {
  root.innerHTML = `
    <div class="panel">
      <h2>Atbash Cipher</h2>
      <p class="desc">Hebrew-origin: A → Z, B → Y, C → X. The alphabet reversed against itself. Self-inverse (encode = decode). Appears in the Hebrew Bible (Jeremiah 25:26, "Sheshach" → "Babel").</p>
      <textarea id="atbash-in" placeholder="Type any text — atbash is symmetric, same operation either direction"></textarea>
      <div class="controls">
        <button onclick="runAtbash()">Transform</button>
      </div>
      <div id="atbash-out" class="output">—</div>
      <table class="table">
        <tr><th>A</th><th>B</th><th>C</th><th>D</th><th>E</th><th>F</th><th>G</th><th>H</th><th>I</th><th>J</th><th>K</th><th>L</th><th>M</th></tr>
        <tr><td>Z</td><td>Y</td><td>X</td><td>W</td><td>V</td><td>U</td><td>T</td><td>S</td><td>R</td><td>Q</td><td>P</td><td>O</td><td>N</td></tr>
      </table>
    </div>
  `;
}
window.runAtbash = () => {
  document.getElementById('atbash-out').textContent = atbash(document.getElementById('atbash-in').value) || '—';
};

// ============ VIGENERE ============
function vigenere(text, key, decode=false) {
  if (!key) return text;
  key = key.toLowerCase().replace(/[^a-z]/g, '');
  if (!key) return text;
  let ki = 0;
  return text.replace(/[a-zA-Z]/g, ch => {
    const base = ch >= 'a' ? 97 : 65;
    const shift = key.charCodeAt(ki % key.length) - 97;
    ki++;
    const s = decode ? -shift : shift;
    return String.fromCharCode(((ch.charCodeAt(0) - base + s) % 26 + 26) % 26 + base);
  });
}

function renderVigenere(root) {
  root.innerHTML = `
    <div class="panel">
      <h2>Vigenère Cipher</h2>
      <p class="desc">Polyalphabetic Caesar: each plaintext letter gets shifted by the corresponding letter of a repeating key. Resisted analysis for ~300 years before Kasiski cracked it (1863) by looking for repeated patterns.</p>
      <textarea id="vig-in" placeholder="Plaintext or ciphertext"></textarea>
      <div class="controls">
        <label>Key</label>
        <input type="text" id="vig-key" placeholder="LEMON" value="LEMON">
        <button onclick="runVig(false)">Encode →</button>
        <button class="ghost" onclick="runVig(true)">← Decode</button>
      </div>
      <div id="vig-out" class="output">—</div>
      <p class="hint">Example: plaintext "ATTACKATDAWN" with key "LEMON" → "LXFOPVEFRNHR". The longer + more random the key, the harder to break.</p>
    </div>
  `;
}
window.runVig = (decode) => {
  const t = document.getElementById('vig-in').value;
  const k = document.getElementById('vig-key').value;
  document.getElementById('vig-out').textContent = vigenere(t, k, decode);
};

// ============ ROT13 ============
function renderRot13(root) {
  root.innerHTML = `
    <div class="panel">
      <h2>ROT13</h2>
      <p class="desc">Caesar shift of 13. Its own inverse (because 13 + 13 = 26 = full rotation). Standard on Usenet in the 1980s to hide spoilers + punchlines. Provides no actual security — pure novelty.</p>
      <textarea id="rot13-in" placeholder="Type any text. ROT13(ROT13(x)) = x."></textarea>
      <div class="controls">
        <button onclick="runRot13()">Transform</button>
      </div>
      <div id="rot13-out" class="output">—</div>
      <p class="hint">Famous: "Pretty Good Privacy" → "Cerggl Tbbq Cevinpl" → "Pretty Good Privacy"</p>
    </div>
  `;
}
window.runRot13 = () => {
  document.getElementById('rot13-out').textContent = caesarShift(document.getElementById('rot13-in').value, 13);
};

// ============ BACON ============
const BACON_TABLE = {
  A:'AAAAA',B:'AAAAB',C:'AAABA',D:'AAABB',E:'AABAA',F:'AABAB',G:'AABBA',H:'AABBB',
  I:'ABAAA',J:'ABAAB',K:'ABABA',L:'ABABB',M:'ABBAA',N:'ABBAB',O:'ABBBA',P:'ABBBB',
  Q:'BAAAA',R:'BAAAB',S:'BAABA',T:'BAABB',U:'BABAA',V:'BABAB',W:'BABBA',X:'BABBB',
  Y:'BBAAA',Z:'BBAAB',
};
const BACON_REVERSE = Object.fromEntries(Object.entries(BACON_TABLE).map(([k,v]) => [v,k]));

function baconEncode(text) {
  return text.toUpperCase().replace(/[A-Z]/g, ch => BACON_TABLE[ch] + ' ').replace(/\s+/g, ' ').trim();
}
function baconDecode(text) {
  return text.toUpperCase().replace(/[^AB]/g, '').match(/.{1,5}/g)?.map(g => BACON_REVERSE[g] || '?').join('') || '';
}

function renderBacon(root) {
  root.innerHTML = `
    <div class="panel">
      <h2>Bacon Cipher</h2>
      <p class="desc">Francis Bacon, 1605. Each letter encoded as 5 binary digits (A/B). The trick: the A's and B's can be HIDDEN in any binary distinction in the carrier — italic vs. roman type, capital vs. lowercase letters, long notes vs. short, white tiles vs. black. Bacon called it a way to "infold" a message inside another.</p>
      <textarea id="bacon-in" placeholder="Plaintext to encode, or Bacon AB-string to decode"></textarea>
      <div class="controls">
        <button onclick="runBaconEncode()">Encode →</button>
        <button class="ghost" onclick="runBaconDecode()">← Decode</button>
      </div>
      <div id="bacon-out" class="output">—</div>
      <p class="hint">Try: encode "HELLO" → AABBB AABAA ABABB ABABB ABBBA. Then imagine each A as a regular letter, each B as a bold letter, hidden in normal-looking text.</p>
    </div>

    <div class="panel">
      <h2>Bacon hidden in carrier text</h2>
      <p class="desc">Bacon's full power: hide AB pattern in a normal-looking sentence using italic vs. regular type. Paste a long carrier and a short secret. The output looks like ordinary writing — but italicized letters spell out your secret.</p>
      <textarea id="bacon-secret" placeholder="Secret to hide (e.g., MEET AT THE LIBRARY)"></textarea>
      <textarea id="bacon-carrier" placeholder="Carrier text (must contain enough letters — need 5 letters per secret letter). Try a Bible verse or a Wikipedia paragraph."></textarea>
      <div class="controls">
        <button onclick="hideBacon()">Hide in carrier</button>
        <button class="ghost" onclick="revealBacon()">Reveal from italic pattern</button>
      </div>
      <div id="bacon-hidden-out" class="output">—</div>
      <p class="hint">The output uses italic tags. View source on the printed page to see exactly which letters were marked. For a real hunt: print the message and italicize the marked letters by hand, OR use Word's italic styling — solvers must spot which letters look different.</p>
    </div>
  `;
}
window.runBaconEncode = () => {
  document.getElementById('bacon-out').textContent = baconEncode(document.getElementById('bacon-in').value);
};
window.runBaconDecode = () => {
  document.getElementById('bacon-out').textContent = baconDecode(document.getElementById('bacon-in').value);
};

window.hideBacon = () => {
  const secret = document.getElementById('bacon-secret').value.toUpperCase().replace(/[^A-Z]/g, '');
  const carrier = document.getElementById('bacon-carrier').value;
  const out = document.getElementById('bacon-hidden-out');
  if (!secret || !carrier) { out.textContent = 'Need both a secret and a carrier.'; return; }
  const baconBits = secret.split('').map(c => BACON_TABLE[c]).join('');
  // Now walk the carrier — for each letter, consume one bit. A = roman, B = italic.
  const carrierLetters = carrier.match(/[a-zA-Z]/g) || [];
  if (carrierLetters.length < baconBits.length) {
    out.innerHTML = `<span style="color:var(--warn);">Carrier too short: needs ${baconBits.length} letters, has ${carrierLetters.length}. Add more text.</span>`;
    return;
  }

      }
    }
    return ch;
  }).join('');

// ============ RAIL FENCE ============
function railFenceEncode(text, rails) {
  if (rails < 2) return text;
  const fence = Array.from({length: rails}, () => []);
  let rail = 0, dir = 1;
  for (const ch of text) {
    fence[rail].push(ch);
    rail += dir;
    if (rail === rails - 1 || rail === 0) dir = -dir;
  }
  return fence.flat().join('');
}
function railFenceDecode(text, rails) {
  if (rails < 2) return text;
  const len = text.length;
  const pattern = [];
  let rail = 0, dir = 1;
  for (let i = 0; i < len; i++) {
    pattern.push(rail);
    rail += dir;
    if (rail === rails - 1 || rail === 0) dir = -dir;
  }
  const sorted = pattern.map((r, i) => [r, i]).sort((a,b) => a[0]-b[0] || a[1]-b[1]);
  const out = new Array(len);
  for (let i = 0; i < len; i++) {
    out[sorted[i][1]] = text[i];
  }
  return out.join('');
}

  root.innerHTML = `

function applyLayer(text, op) {

  if (name === 'vigenere') return vigenere(text, arg);
  if (name === 'rail') return railFenceEncode(text.replace(/\s/g, ''), parseInt(arg, 10));
  return text;
}

// ============ ENIGMA ============
// Historical Wehrmacht Enigma I rotor wirings and notches.
// Each wiring is the permutation A->? B->? ... Z->?
// Notch is the letter that, when displayed in the rotor window,
// causes the NEXT rotor to step on the next keypress.
const ENIGMA_ROTORS = {
  I:    { wiring: 'EKMFLGDQVZNTOWYHXUSPAIBRCJ', notch: 'Q' },
  II:   { wiring: 'AJDKSIRUXBLHWTMCQGZNPYFVOE', notch: 'E' },
  III:  { wiring: 'BDFHJLCPRTXVZNYEIWGAKMUSQO', notch: 'V' },
  IV:   { wiring: 'ESOVPZJAYQUIRHXLNFTGKDCMWB', notch: 'J' },
  V:    { wiring: 'VZBRGITYUPSDNHLXAWMJQOFECK', notch: 'Z' },
};
const ENIGMA_REFLECTORS = {
  A: 'EJMZALYXVBWFCRQUONTSPIKHGD',
  B: 'YRUHQSLDPXNGOKMIEBFZCWVJAT',
  C: 'FVPJIAOYEDRZXWGCTKUQSBNMHL',
};

function letterToNum(c) { return c.charCodeAt(0) - 65; }
function numToLetter(n) { return String.fromCharCode(((n % 26) + 26) % 26 + 65); }

function makeRotor(name, position) {
  // position: letter shown in the window initially, e.g. 'A'
  const r = ENIGMA_ROTORS[name];
  // Forward map: input pin index -> output pin index, given rotor at position 0
  const wiring = r.wiring.split('').map(letterToNum);
  const reverse = new Array(26);
  wiring.forEach((to, from) => { reverse[to] = from; });
  return {
    name,
    notchPos: letterToNum(r.notch),
    pos: letterToNum(position),
    forward: wiring,
    reverse,
  };
}

function makeReflector(name) {
  return ENIGMA_REFLECTORS[name].split('').map(letterToNum);
}

function makePlugboard(pairsStr) {
  const map = new Array(26).fill(0).map((_, i) => i);
  const pairs = pairsStr.toUpperCase().split(/[\s,]+/).filter(s => s.length === 2);
  pairs.forEach(p => {
    const a = letterToNum(p[0]);
    const b = letterToNum(p[1]);
    if (a >= 0 && a < 26 && b >= 0 && b < 26) {
      map[a] = b;
      map[b] = a;
    }
  });
  return map;
}

function rotorForward(rotor, signalIdx) {
  // shift input by rotor position, look up wiring, shift output back
  const shifted = (signalIdx + rotor.pos) % 26;
  const wired = rotor.forward[shifted];
  return ((wired - rotor.pos) % 26 + 26) % 26;
}

function rotorReverse(rotor, signalIdx) {
  const shifted = (signalIdx + rotor.pos) % 26;
  const wired = rotor.reverse[shifted];
  return ((wired - rotor.pos) % 26 + 26) % 26;
}

function stepRotors(rotors) {
  // rotors[0] = fast rotor (right), rotors[1] = middle, rotors[2] = slow (left)
  // Double-stepping: if middle rotor is at its notch, both middle AND slow step.
  const willStepMiddle = (rotors[0].pos === rotors[0].notchPos);
  const willStepSlow = (rotors[1].pos === rotors[1].notchPos);
  // Middle steps if right is at notch OR middle is at notch (double-step)
  if (willStepMiddle || willStepSlow) {
    rotors[1].pos = (rotors[1].pos + 1) % 26;
  }
  // Slow steps only if middle is at notch
  if (willStepSlow) {
    rotors[2].pos = (rotors[2].pos + 1) % 26;
  }
  // Fast rotor always steps
  rotors[0].pos = (rotors[0].pos + 1) % 26;
}

function encryptLetter(letter, state) {
  if (!/[A-Z]/.test(letter)) return letter;
  stepRotors(state.rotors);
  let signal = letterToNum(letter);
  // Through plugboard
  signal = state.plugboard[signal];
  // Through rotors right to left
  signal = rotorForward(state.rotors[0], signal);
  signal = rotorForward(state.rotors[1], signal);
  signal = rotorForward(state.rotors[2], signal);
  // Through reflector
  signal = state.reflector[signal];
  // Back through rotors left to right
  signal = rotorReverse(state.rotors[2], signal);
  signal = rotorReverse(state.rotors[1], signal);
  signal = rotorReverse(state.rotors[0], signal);
  // Back through plugboard
  signal = state.plugboard[signal];
  return numToLetter(signal);
}

function runEnigma(text, config) {
  const state = {
    rotors: [
      makeRotor(config.r1, config.p1),  // fast (right)
      makeRotor(config.r2, config.p2),  // middle
      makeRotor(config.r3, config.p3),  // slow (left)
    ],
    reflector: makeReflector(config.reflector),
    plugboard: makePlugboard(config.plugboard || ''),
  };
  return text.toUpperCase().split('').map(c => encryptLetter(c, state)).join('');
}

  practiceState[p.level] = practiceState[p.level] || {};
  practiceState[p.level].attempt = input;
  const fb = document.getElementById('crack-feedback-' + i);
  if (normalize(input) === normalize(p.answer)) {
    practiceState[p.level].solved = true;
    localStorage.setItem('cipher-lab.crack.v1', JSON.stringify(practiceState));
    fb.innerHTML = '<div style="color:var(--accent);font-weight:600;">✓ correct. ' + escapeHtml(p.explain) + '</div>';
  } else {
    localStorage.setItem('cipher-lab.crack.v1', JSON.stringify(practiceState));
    fb.innerHTML = '<div style="color:#c46a4a;">not yet. compare your decryption letter-by-letter.</div>';
  }
};

window.hintCrack = (i) => {
  const p = PRACTICE[i];
  practiceState[p.level] = practiceState[p.level] || {};
  practiceState[p.level].hintShown = true;
  localStorage.setItem('cipher-lab.crack.v1', JSON.stringify(practiceState));
  document.getElementById('crack-feedback-' + i).innerHTML =
    '<div style="color:var(--warn);"><strong>HINT:</strong> ' + escapeHtml(p.hint) + '</div>';
};

window.revealCrack = (i) => {
  const p = PRACTICE[i];
  if (!confirm('Reveal the answer? You will no longer be marked solved for this level.')) return;
  practiceState[p.level] = practiceState[p.level] || {};
  practiceState[p.level].revealed = true;
  localStorage.setItem('cipher-lab.crack.v1', JSON.stringify(practiceState));
  document.getElementById('crack-feedback-' + i).innerHTML =
    '<div style="color:var(--accent);"><strong>ANSWER:</strong> ' + escapeHtml(p.answer) + '<br><em>' + escapeHtml(p.explain) + '</em></div>';
};

// Initial route
const hash = location.hash.slice(1);
const initial = CIPHERS.find(c => c.id === hash) ? hash : 'caesar';
showCipher(initial);
</script>
